services:
  mysql:
    image: mysql:8.0
    container_name: attractions_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-0988709784Kk!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-my_db}
      TZ: Asia/Bangkok
    ports:
      - "3307:3306" 
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [stack]

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: attractions_pma
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80" 
    depends_on: [mysql]
    networks: [stack]

  api:
    build: 
      context: ./backend-estimates
    container_name: attractions_api
    restart: unless-stopped
    environment:
      - DB_DSN=root:${MYSQL_ROOT_PASSWORD:-0988709784Kk!}@tcp(mysql:3306)/${MYSQL_DATABASE:-my_db}?parseTime=true
      - PORT=3000  
    ports:
      - "3001:3000" 
    depends_on: [mysql]
    networks: [stack]

  frontend:
    build:
      context: ./frontend-estimates
      args:
        - VITE_API_URL=${VITE_API_URL} 
    container_name: attractions_frontend
    restart: unless-stopped
    ports:
      - "3000:80" 
    depends_on: [api]
    networks: [stack]

volumes:
  mysql_data:

networks:
  stack:
    driver: bridge